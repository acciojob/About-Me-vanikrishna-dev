<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Page</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <div class="left">

      <div class="profile-img">
        <img src="https://media.licdn.com/dms/image/v2/D5603AQFDwv9lsjdd3Q/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1702610068966?e=2147483647&v=beta&t=OO__RAc381z2Am9dnFDDpm1Yu-6UO1ZPlPCR-y48Qjg" alt="profile">
      </div>

      <section>
        <h2><i class="fa fa-user"></i> Name</h2>
        <p>Vani Krishna</p>
      </section>

      <section>
        <h2><i class="fa fa-envelope"></i> Email</h2>
        <p>vanikrishna02@gmail.com</p>
      </section>

      <section>
        <h2><i class="fa fa-briefcase"></i> Profile</h2>
        <p>Frontend Developer</p>
      </section>

    </div>

    <div class="right">

      <section>
        <h2><i class="fa fa-user-circle"></i> About me</h2>
        <p>
          I am a passionate developer who enjoys building modern and responsive web applications.
          I love learning new technologies and improving my skills every day.
        </p>
      </section>

      <section>
        <h2><i class="fa fa-code"></i> Skills</h2>

        <div class="skill">
          <span><i class="fab fa-html5"></i> HTML</span>
          <div class="bar"><div style="--width: 90%"></div></div>
        </div>

        <div class="skill">
          <span><i class="fab fa-css3-alt"></i> CSS</span>
          <div class="bar"><div style="--width: 85%"></div></div>
        </div>

        <div class="skill">
          <span><i class="fab fa-js"></i> JavaScript</span>
          <div class="bar"><div style="--width: 75%"></div></div>
        </div>

        <div class="skill">
          <span><i class="fab fa-python"></i> Python</span>
          <div class="bar"><div style="--width: 80%"></div></div>
        </div>

      </section>

    </div>

  </div>

</body>
</html>
